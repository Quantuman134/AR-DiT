# ----------------------------------------------------------------------
# Model architecture config — DiT-S/2 on CIFAR-10 (pixel space).
#
# This file is the single source of truth for the DiT architecture.
# It is referenced (not duplicated) by both training and sampling configs.
# When a checkpoint is saved, this YAML is frozen into the checkpoint;
# loading a checkpoint always uses the frozen copy, so train/eval can
# never disagree on architecture.
#
# See doc/DiT.md for the meaning of each field.
# ----------------------------------------------------------------------

arch_name: DiT_S_2          # one of: DiT_S_2, DiT_B_2, DiT_L_2, DiT_XL_2
                            # (selects (depth, hidden_size, num_heads); the
                            # remaining fields below are independent of the
                            # preset and override the preset's defaults.)

input_size: 32              # H = W
in_channels: 3              # CIFAR-10 RGB; pixel space (no VAE).
patch_size: 2               # PatchEmbed kernel/stride. 32 / 2 = 16x16 = 256 tokens.

num_classes: 10             # CIFAR-10 has 10 classes; +1 null slot is added
                            # internally by LabelEmbedder for CFG.

class_dropout_prob: 0.1     # CFG label-dropout probability during training.
                            # See doc/FlowMatching.md §4.1.
